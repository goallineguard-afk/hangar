{% extends "base.html" %}
{% block title %}Hangar — Sign in{% endblock %}
{% block bodyclass %}gate{% endblock %}
{% block content %}
<div class="gate-wrap">
  <div class="gate-card">
    <div class="gate-mark">HANGAR</div>
    <p class="gate-sub">Your files, dispatched from one dock.</p>
    <form method="post" class="gate-form">
      <label for="password">Access code</label>
      <input type="password" id="password" name="password" autofocus placeholder="••••••••" required>
      {% if error %}<div class="gate-error">{{ error }}</div>{% endif %}
      <button type="submit">Open the dock</button>
    </form>
  </div>
</div>
{% endblock %}
